num_episodes: 200
batch_size: 64
epsilon: 0.02
gamma: 0.99
learning_rate: 0.0005
target_update_frequency: 10

# Role C - Priority Dyna-Q settings
run_name: priority_dynaq
eval_config: configs/eval_standard.yaml

max_decision_steps: 5000

# Tabular Q-learning step size
# learning_rate hoca configinden kalıyor ama tabular Dyna-Q için alpha daha doğru parametre.
alpha: 0.10

epsilon_start: 1.0
epsilon_min: 0.02
epsilon_decay: 0.995

planning_steps: 20
priority_threshold: 0.0001

position_bin: 2
order_position_bin: 3
soc_bins: 5
age_bin: 10
time_bins: 10
top_k_orders: 8